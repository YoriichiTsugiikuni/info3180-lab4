{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
    {% for image in images %}
    <div>
        <img src="{{ url_for('get_image', filename=image) }}" style="width: 100%; height: 200px; object-fit: cover;">
    </div>
    {% endfor %}
</div>
{% endblock %}
